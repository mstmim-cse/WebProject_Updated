<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UIU Lost & Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-color);">

    <div class="card" style="width: 100%; max-width: 450px; padding: 40px; text-align: center;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 32px; font-size: 2rem;">
            <i class="fas fa-search-location"></i> UIU L&F
        </a>
        
        <h2 style="margin-bottom: 8px;">Welcome Back</h2>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">Login with your UIU student account</p>

        <form action="dashboard.html" method="GET">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Student ID</label>
                <input type="text" class="form-control" placeholder="e.g. 011231234" required>
            </div>
            <div class="form-group" style="text-align: left; position: relative;">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" data-target="loginPassword" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                </div>
                <a href="#" style="position: absolute; right: 0; top: 0; font-size: 0.875rem; color: var(--primary);">Forgot?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Log In</button>
        </form>

        <div style="margin-top: 32px; position: relative; text-align: center;">
            <hr style="border: 0; border-top: 1px solid var(--border-color);">
            <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--surface-color); padding: 0 16px; color: var(--text-secondary); font-size: 0.875rem;">OR</span>
        </div>

        <p style="margin-top: 32px; color: var(--text-secondary); font-size: 0.875rem;">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 500;">Sign up</a>
        </p>
    </div>

    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
